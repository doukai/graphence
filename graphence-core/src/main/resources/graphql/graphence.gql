"用户"
type User implements NamedStruct {
    "ID"
    id: ID @jsonSchema(maxLength: 50)
    "姓名"
    name: String! @jsonSchema(minLength: 2 maxLength: 20)
    "描述"
    description: String @jsonSchema(maxLength: 100)
    "姓氏"
    lastName: String @jsonSchema(maxLength: 20)
    "账号"
    login: String! @options(unique: true) @jsonSchema(minLength: 6 maxLength: 20)
    "盐"
    salt: String
    "哈希"
    hash: String
    "邮箱"
    email: String @jsonSchema(maxLength: 50)
    "手机号"
    phones: [String] @jsonSchema(maxLength: 11)
    "禁用"
    disable: Boolean
    "数据权限等级"
    dataPermissionLevel: DataPermissionLevel
    "当前组"
    group: Group @map(from: "groupId" to: "id")
    "组"
    groups: [Group]
    "角色"
    roles: [Role]
    "租户"
    realm: Realm @map(from: "realmId" to: "id")
}

"角色"
type Role implements NamedStruct {
    "ID"
    id: ID @jsonSchema(maxLength: 50)
    "名称"
    name: String! @options(unique: true) @jsonSchema(minLength: 2 maxLength: 20)
    "描述"
    description: String @jsonSchema(maxLength: 100)
    "用户"
    users: [User]
    "组"
    groups: [Group]
    "组合"
    composites: [Role] @map(from: "id" with: { type: "RoleCompositeRelation" from: "roleRef" to: "compositeRef" } to: "id")
    "权限"
    permissions: [Permission] @map(from: "id" with: { type: "RolePermissionRelation" from: "roleRef" to: "permissionRef" } to: "name")
    "租户"
    realm: Realm @map(from: "realmId" to: "id")
}

"组"
type Group implements NamedStruct & TreeStruct {
    "ID"
    id: ID @jsonSchema(maxLength: 50)
    "名称"
    name: String! @options(unique: true) @jsonSchema(minLength: 2 maxLength: 50)
    "描述"
    description: String @jsonSchema(maxLength: 100)
    "路径"
    path: String
    "层级"
    deep: Int @jsonSchema(maxLength: 2)
    "上级ID"
    parentId: String
    "上级"
    parent: Group @map(from: "parentId" to: "id")
    "下级"
    subGroups: [Group] @map(from: "id" to: "parentId")
    "用户"
    users: [User]
    "角色"
    roles: [Role]
    "租户"
    realm: Realm @map(from: "realmId" to: "id")
}

"租户"
type Realm implements NamedStruct {
    "ID"
    id: ID @jsonSchema(maxLength: 50)
    "名称"
    name: String! @options(unique: true) @jsonSchema(minLength: 2 maxLength: 20)
    "描述"
    description: String
}

"权限"
type Permission {
    "ID"
    id: ID @jsonSchema(maxLength: 50)
    "名称"
    name: String! @jsonSchema(maxLength: 50)
    "描述"
    description: String @jsonSchema(maxLength: 100)
    "字段"
    field: String! @jsonSchema(maxLength: 50)
    "实体"
    type: String! @jsonSchema(maxLength: 50)
    "权限类型"
    permissionType: PermissionType!
    "角色"
    roles: [Role] @map(from: "name" with: { type: "RolePermissionRelation" from: "permissionRef" to: "roleRef" } to: "id")
    "租户"
    realm: Realm @map(from: "realmId" to: "id")
}

"权限类型"
enum PermissionType {
    "读取"
    READ
    "写入"
    WRITE
    "全部"
    ANY
}

"数据权限等级"
enum DataPermissionLevel {
    "全部"
    ALL
    "同级"
    SAME_LEVEL
    "同级与下级"
    SAME_AND_LOWER
    "仅下级"
    LOWER_ONLY
    "仅自己"
    SELF_ONLY
}

"数据归属"
interface CreateBy {
    "创建用户ID"
    createUserId: String
    "创建组ID"
    createGroupId: String
}
